name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check
        run: |
          python -m py_compile app.py streamlit_app.py src/__init__.py src/data_loader.py src/embedding.py src/search.py src/vectorstore.py

      - name: Run tests
        run: pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: ${{ github.event.inputs.environment || 'production' }}
    timeout-minutes: 10

    steps:
      - name: Deploy eligibility
        run: echo "Verification passed. Triggering deployment."

      - name: Deploy via webhook (optional)
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.STREAMLIT_DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "STREAMLIT_DEPLOY_WEBHOOK_URL not set; skipping deployment trigger."
            exit 0
          fi
          curl -X POST "$DEPLOY_WEBHOOK_URL"
          echo "Deployment webhook triggered."
